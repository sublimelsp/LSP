[tool.pyright]
pythonVersion = "3.8"
reportIncompatibleMethodOverride = "none"
reportMissingModuleSource = "none"
stubPath = "./stubs"
typeCheckingMode = "standard"

[tool.tox]
env_list = ["py3"]
skipsdist = true

[tool.tox.env_run_base]
deps = [
    "mypy==1.18.2",
    "pyright==1.1.408",
    "ruff==0.15.10",
    "orjson==3.11.4",
]
commands = [
    # mypy disabled for main code as it doesn't currently support cyclic definitions - https://github.com/python/mypy/issues/731
    ["mypy", "stubs"],
    ["pyright", "plugin", "stubs"],
    ["ruff", "check"],
]

[tool.ruff]
exclude = [
    "third_party",
    "stubs"
]
line-length = 120
target-version = "py38"

[tool.ruff.format]
quote-style = "preserve"
indent-style = "space"
# Respect magic trailing commas.
skip-magic-trailing-comma = false
# Automatically detect the appropriate line ending.
line-ending = "auto"

[tool.ruff.lint.isort]
case-sensitive = false
force-single-line = true
from-first = true
no-sections = true
order-by-type = false
required-imports = ["from __future__ import annotations"]

[tool.ruff.lint.per-file-ignores]
"plugin/core/typing.py" = ["F401"]
"protocol/__init__.py" = ["D400", "D415"]
"plugin/core/protocol.py" = ["UP006", "UP007"]

[tool.ruff.lint]
